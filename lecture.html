<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교육과정 · 강의 목록 | (사)미래교육이룸학술협회</title>
  <meta name="description" content="기업 후원으로 교육비가 지원되는 평생교육·민간자격 과정을 분야별로 확인하세요." />
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="lecture">
  <a href="#main" class="skip-link">본문 바로가기</a>

  <header class="site-header" id="site-header"></header>

  <main id="main">
    <section class="page-hero">
      <div class="container">
        <ol class="breadcrumb">
          <li><a href="index.html">홈</a></li>
          <li aria-current="page">강의</li>
        </ol>
        <h1 class="page-hero__title">교육과정 안내</h1>
        <p class="page-hero__desc">
          💙 전액지원 과정은 기업 사회공헌 기부금으로 교육비 전액이 지원되어 수강생 부담이 없습니다.
        </p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="lecture-layout">
          <!-- 좌측 필터 -->
          <aside aria-label="교육과정 필터" style="display:grid;gap:20px">
            <div class="filter">
              <h2 class="filter__head">분야</h2>
              <ul class="filter__list" id="catFilter"></ul>
            </div>

            <div class="filter">
              <h2 class="filter__head">교육비 지원</h2>
              <ul class="filter__list" id="fundFilter"></ul>
            </div>

            <div class="notice-box">
              <ul>
                <li>후원 과정은 지원 예산 소진 시 자부담 과정으로 전환될 수 있습니다.</li>
                <li>지원 대상 여부는 신청 후 협회에서 확인해 안내드립니다.</li>
                <li>모든 금액·과정 정보는 예시입니다.</li>
              </ul>
            </div>
          </aside>

          <!-- 우측 목록 -->
          <div>
            <div class="list-toolbar">
              <div>
                <h2 id="lectureTitle" style="font-size:1.5rem;font-weight:800;letter-spacing:-0.02em">전체 자격과정</h2>
                <p class="list-toolbar__count" id="lectureCount" style="color:var(--color-text-soft);font-size:0.875rem"></p>
              </div>

              <div class="sort-tabs" id="sortTabs" role="group" aria-label="정렬 방식">
                <button type="button" data-sort="popular" aria-pressed="true">인기순</button>
                <button type="button" data-sort="latest" aria-pressed="false">최신순</button>
                <button type="button" data-sort="rating" aria-pressed="false">평점순</button>
                <button type="button" data-sort="cost" aria-pressed="false">부담금 낮은순</button>
              </div>
            </div>

            <div class="grid grid--3" id="lectureGrid" aria-live="polite"></div>

            <nav class="pagination" id="pagination" aria-label="페이지 이동"></nav>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer" id="site-footer"></footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
